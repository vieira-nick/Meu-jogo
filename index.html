```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quase Panqueca V2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- MENU -->
    <section id="menu" class="screen active">

        <div class="menu-box">

            <h1 class="game-title">
                QUASE PANQUECA
            </h1>

            <p class="subtitle">
                Neon Survival Edition
            </p>

            <div class="frog-icon">
                🐸
            </div>

            <button onclick="startGame('easy')" class="menu-btn">
                EASY MODE
            </button>

            <button onclick="startGame('medium')" class="menu-btn">
                MEDIUM MODE
            </button>

            <button onclick="startGame('hard')" class="menu-btn">
                HARD MODE
            </button>

            <p class="instructions">
                Use ↑ ↓ ← → para sobreviver
            </p>

        </div>

    </section>


    <!-- TELA DO JOGO -->
    <section id="gameScreen" class="screen hidden">

        <div id="hud">

            <div class="hud-left">
                <span>LEVEL</span>
                <strong id="level">1</strong>
            </div>

            <div class="hud-center">
                QUASE PANQUECA
            </div>

            <div class="hud-right">
                <span>LIVES</span>
                <strong id="lives">♥♥♥</strong>
            </div>

        </div>

        <canvas id="gameCanvas" width="480" height="640"></canvas>

        <!-- MOBILE -->
        <div id="mobileControls">

            <button onclick="movePlayer('up')">↑</button>

            <div class="horizontal">

                <button onclick="movePlayer('left')">←</button>

                <button onclick="movePlayer('down')">↓</button>

                <button onclick="movePlayer('right')">→</button>

            </div>

        </div>

    </section>


    <!-- GAME OVER -->
    <section id="gameOver" class="screen hidden">

        <div class="result-box">

            <h2>GAME OVER</h2>

            <p>
                Você virou panqueca digital.
            </p>

            <button onclick="restartGame()">
                TRY AGAIN
            </button>

            <button onclick="goMenu()">
                MENU
            </button>

        </div>

    </section>


    <!-- VITÓRIA -->
    <section id="victory" class="screen hidden">

        <div class="result-box">

            <h2>YOU SURVIVED</h2>

            <p>
                O sapo venceu o caos.
            </p>

            <button onclick="restartGame()">
                PLAY AGAIN
            </button>

            <button onclick="goMenu()">
                MENU
            </button>

        </div>

    </section>


    <script src="script.js"></script>

</body>
</html>
```
