<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quase Panqueca</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- =========================
         MENU INICIAL
    ========================== -->

    <div id="menu" class="screen active">

        <div class="menu-box">

            <h1>🐸 QUASE PANQUECA</h1>

            <p>Atravessar nunca foi tão perigoso.</p>

            <button id="easyBtn">Fácil</button>

            <button id="mediumBtn">Médio</button>

            <button id="hardBtn">Difícil</button>

            <div class="controls-info">
                Use ↑ ↓ ← → para mover
            </div>

        </div>

    </div>



    <!-- =========================
         TELA DO JOGO
    ========================== -->

    <div id="gameScreen" class="screen hidden">

        <div id="hud">

            <div>
                Fase:
                <span id="fase">1</span>
            </div>

            <div>
                ❤️
                <span id="vidas">3</span>
            </div>

        </div>


        <!-- IMPORTANTE -->
        <!-- JS vai procurar ESSE ID -->
        <canvas id="gameCanvas" width="500" height="650"></canvas>


        <!-- CONTROLE MOBILE -->

        <div id="mobileControls">

            <button data-move="up">↑</button>

            <div class="mobile-row">

                <button data-move="left">←</button>

                <button data-move="down">↓</button>

                <button data-move="right">→</button>

            </div>

        </div>

    </div>



    <!-- =========================
         GAME OVER
    ========================== -->

    <div id="gameOver" class="screen hidden">

        <div class="result-box">

            <h2>💀 GAME OVER</h2>

            <p>Você virou panqueca.</p>

            <button id="restartBtn">
                Jogar Novamente
            </button>

        </div>

    </div>



    <!-- =========================
         VITÓRIA
    ========================== -->

    <div id="victory" class="screen hidden">

        <div class="result-box">

            <h2>🏆 VOCÊ VENCEU</h2>

            <p>O sapo sobreviveu.</p>

            <button id="victoryRestartBtn">
                Jogar Novamente
            </button>

        </div>

    </div>



    <!-- JS SEMPRE NO FINAL -->

    <script src="script.js"></script>

</body>
</html>
