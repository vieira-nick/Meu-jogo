<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>blue frog 🐸</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- MENU -->
    <div id="menu" class="screen">
        <div class="menu-box">
            <div class="frog-icon">🐸</div>
            <h1>blue frog</h1>
            <p class="subtitle">Atravesse a rua. Não vire patê.</p>
            <button id="playBtn" class="btn-play">▶ Jogar</button>
            <div class="controls-info">Use ↑ ↓ ← → ou os botões abaixo</div>
        </div>
    </div>

    <!-- TELA DO JOGO -->
    <div id="gameScreen" class="screen hidden">
        <div id="hud">
            <div class="hud-item">Fase <span id="fase">1</span></div>
            <div class="hud-item"><span id="vidas">❤️❤️❤️</span></div>
            <div class="hud-item">⭐ <span id="score">0</span></div>
            <button id="menuBtn">🏠</button>
        </div>
        <canvas id="gameCanvas" width="500" height="650"></canvas>
        <div id="mobileControls">
            <button data-move="up">↑</button>
            <div class="mobile-row">
                <button data-move="left">←</button>
                <button data-move="down">↓</button>
                <button data-move="right">→</button>
            </div>
        </div>
    </div>

    <!-- GAME OVER -->
    <div id="gameOver" class="screen hidden">
        <div class="result-box">
            <div class="result-icon">💀</div>
            <h2>Virou Panqueca!</h2>
            <p>O trânsito não perdoou.</p>
            <div class="scores">
                <div class="score-line">Pontos: <strong id="finalScoreOver">0</strong></div>
                <div class="score-line record">🏆 Recorde: <strong id="finalHighScoreOver">0</strong></div>
            </div>
            <button id="restartBtn">↺ Tentar de Novo</button>
            <button id="menuFromGameOver" class="btn-secondary">🏠 Menu</button>
        </div>
    </div>

    <!-- VITÓRIA -->
    <div id="victory" class="screen hidden">
        <div class="result-box win">
            <div class="result-icon">🏆</div>
            <h2>Você Escapou!</h2>
            <p>O sapo chegou ao outro lado!</p>
            <div class="scores">
                <div class="score-line">Pontos: <strong id="finalScore">0</strong></div>
                <div class="score-line record">🏆 Recorde: <strong id="finalHighScore">0</strong></div>
            </div>
            <button id="victoryRestartBtn">▶ Jogar Novamente</button>
            <button id="menuFromVictory" class="btn-secondary">🏠 Menu</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
